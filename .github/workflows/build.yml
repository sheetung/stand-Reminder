name: build-windows-with-release-notes

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以便生成 changelog

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Download dependencies
        run: go mod tidy

      - name: Run tests
        run: go test ./...

      - name: Set build metadata
        id: meta
        shell: pwsh
        run: |
          if ('${{ github.ref_type }}' -eq 'tag') {
            $version = '${{ github.ref_name }}'
          } else {
            $version = 'dev'
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "exe_name=stand-reminder.exe" >> $env:GITHUB_OUTPUT
          "zip_name=stand-reminder-$version-windows.zip" >> $env:GITHUB_OUTPUT

      - name: Build executable
        run: go build -ldflags="-H windowsgui -X main.Version=${{ steps.meta.outputs.version }}" -o "${{ steps.meta.outputs.exe_name }}" .

      - name: Embed application icon
        shell: pwsh
        run: .\scripts\embed-icon.ps1 -ExePath "${{ steps.meta.outputs.exe_name }}" -IconPath ".\assets\stand-reminder.ico"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          echo "ISCC_PATH=${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" >> $env:GITHUB_ENV

      - name: Build installer
        if: github.ref_type == 'tag'
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}' -replace '^v', ''
          $issPath = "setup.iss"
          $outputDir = "dist"
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
          & "$env:ISCC_PATH" ("/O$((Get-Item $outputDir).FullName)", "/DMyAppVersion=$version", $issPath)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stand-reminder-${{ steps.meta.outputs.version }}-windows
          path: |
            ${{ steps.meta.outputs.exe_name }}
            dist\*-Setup.exe
          if-no-files-found: ignore

      - name: Generate changelog
        if: github.ref_type == 'tag'
        id: changelog
        shell: pwsh
        run: |
          $currentTag = '${{ github.ref_name }}'
          $previousTag = git describe --tags --abbrev=0 "$currentTag^" 2>$null

          if ($LASTEXITCODE -ne 0 -or -not $previousTag) {
            $commits = @(git log --pretty=format:"- %s" --max-count=20 2>$null)
          } else {
            $commits = @(git log "$previousTag..$currentTag" --pretty=format:"- %s" 2>$null)
          }

          if (-not $commits) {
            $commits = @("- Initial release")
          }

          $body = @(
            "## 更新内容"
            ""
          ) + $commits
          $body | Set-Content -Path "CHANGELOG.tmp" -Encoding utf8

      - name: Publish release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Stand Reminder ${{ github.ref_name }}
          body_path: CHANGELOG.tmp
          files: |
            dist\*-Setup.exe
