name: build-windows

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download dependencies
        run: go mod tidy

      - name: Run tests
        run: go test ./...

      - name: Build executable
        run: go build -ldflags="-H windowsgui" -o stand-reminder.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stand-reminder-windows
          path: stand-reminder.exe